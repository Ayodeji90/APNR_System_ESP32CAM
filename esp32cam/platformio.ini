; ANPR Gate System — ESP32-CAM Edge Firmware
; PlatformIO project configuration
;
; Build:    pio run
; Upload:   pio run -t upload        (GPIO 0 → GND + press RST first!)
; Monitor:  pio device monitor      (remove GPIO 0 jumper + RST first)
;
; Note: the official `espressif32` platform ships Arduino core 2.x.
; The firmware also supports core 3.x (via the pioarduino fork) —
; the LEDC compatibility shim in main.cpp handles both.

[env:esp32cam]
platform = espressif32
board = esp32cam
framework = arduino

; AI-Thinker ESP32-CAM has 4 MB flash + 4 MB PSRAM
board_build.partitions = huge_app.csv
build_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue

lib_deps =
    esp32async/AsyncTCP@^3.0.0
    esp32async/ESPAsyncWebServer@^3.0.0

; Serial flashing via USB-TTL adapter. Drop upload_speed to 115200
; if your adapter/wiring is flaky at higher rates.
upload_speed = 460800
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
