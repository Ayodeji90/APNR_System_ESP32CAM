# ============================================================
# ANPR Gate System — Configuration (Push-Based ESP32-CAM)
# ============================================================
# Architecture: the ESP32-CAM detects vehicles locally, captures
# images, and POSTs them to this server for ANPR processing.
# No port forwarding or DuckDNS required — the ESP32 only needs
# outbound internet access (any WiFi / phone hotspot works).

# ── ESP32-CAM Authentication ──────────────────────────────
# The api_key authenticates incoming requests FROM the ESP32.
# Must match the API_KEY constant in the ESP32 firmware.
esp32:
  api_key: "3b01f25b914defb99bbb4aaca51f1f2de7fb7c66e3c47116"
  heartbeat_timeout_sec: 120    # Consider ESP32 offline if no heartbeat for this long

camera:
  resolution_width: 640
  resolution_height: 480
  capture_count: 5            # Not used in push model (ESP32 sends single best frame)
  warmup_seconds: 0

sensor:
  distance_threshold_cm: 50   # Vehicle present if distance < this (configured on ESP32 too)
  confirmation_readings: 3    # Consecutive readings to confirm presence (ESP32-side)
  reading_interval_sec: 0.1

actuator:
  servo_open_angle: 90        # Barrier open angle (ESP32-side config)
  servo_closed_angle: 0       # Barrier closed angle (ESP32-side config)
  open_duration_sec: 10       # Auto-close after this many seconds (ESP32 manages this)
  use_servo: true
  use_relay: false

detection:
  min_detection_confidence: 0.4   # geometric localisation score (0-1)
  min_ocr_confidence: 40      # Tesseract confidence (0-100); whitelist match is the real gate for ALLOW
  whitelist_fuzzy_distance: 2 # Allow up to N character OCR errors when matching the whitelist (0 = exact only). Lower to 0-1 for production.
  max_retries: 3              # Retry detection/OCR on the same image
  preprocessing_width: 800
  plate_aspect_min: 1.3       # squarish stylised plates (e.g. Lagos) run ~1.7:1
  plate_aspect_max: 6.0
  min_plate_area: 1000

ocr:
  engine: "easyocr"           # "easyocr" (deep learning — best for stylised plates) or "tesseract"
  easyocr_gpu: false          # set true only if the VM has a CUDA GPU
  tesseract_psm: 7
  char_whitelist: "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789"

paths:
  database: "data/db/anpr.db"
  events_dir: "data/events"
  event_retention_days: 30

web:
  host: "0.0.0.0"
  port: 5000
  debug: false
  secret_key: ""              # Flask secret key (auto-generated if empty)
  dashboard_username: "admin"
  dashboard_password: "admin"  # Change this!

logging:
  level: "INFO"
  file: "data/anpr.log"

